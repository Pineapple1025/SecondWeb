<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>吉普力風 IP 子網路計算器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background"></div>

  <main class="container">
    <section class="card">
      <h1>🌿 IP 子網路計算器</h1>
      <p class="subtitle">輸入 IP 與首碼或子網路遮罩，幫你算出完整網段資訊</p>

      <div class="tabs">
        <button class="tab active" data-mode="cidr">IP + 首碼</button>
        <button class="tab" data-mode="mask">IP + 子網路遮罩</button>
      </div>

      <div class="form" id="cidrForm">
        <label for="cidrInput">輸入格式（例如：192.168.1.10/24）</label>
        <input type="text" id="cidrInput" placeholder="例如：192.168.1.10/24" />
      </div>

      <div class="form hidden" id="maskForm">
        <label for="ipInput">IP 位址</label>
        <input type="text" id="ipInput" placeholder="例如：192.168.1.10" />

        <label for="maskInput">子網路遮罩</label>
        <input type="text" id="maskInput" placeholder="例如：255.255.255.0" />
      </div>

      <div class="actions">
        <button id="calculateBtn">開始計算</button>
        <button id="clearBtn" class="secondary">清除</button>
      </div>

      <p id="error" class="error"></p>

      <section id="result" class="result hidden">
        <h2>計算結果</h2>
        <div class="result-grid">
          <div class="item"><span>子網路遮罩</span><strong id="outMask">-</strong></div>
          <div class="item"><span>網段名稱</span><strong id="outNetwork">-</strong></div>
          <div class="item"><span>廣播位置</span><strong id="outBroadcast">-</strong></div>
          <div class="item"><span>IP 網段範圍</span><strong id="outRange">-</strong></div>
          <div class="item"><span>可用 IP 範圍</span><strong id="outUsable">-</strong></div>
          <div class="item"><span>主機數量</span><strong id="outHosts">-</strong></div>
        </div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
