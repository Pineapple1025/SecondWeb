<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>吉卜力風 IP 子網路計算器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="grass"></div>
  </div>

  <main class="wrap">
    <section class="card">
      <h1>🌿 吉卜力風 IP 子網路計算器</h1>
      <p class="desc">輸入 IP 與首碼或子網路遮罩，計算完整網段資訊</p>

      <div class="mode-switch">
        <button class="mode-btn active" data-mode="cidr">IP / 首碼</button>
        <button class="mode-btn" data-mode="mask">IP + 子網路遮罩</button>
      </div>

      <section id="cidr-panel" class="panel">
        <label for="cidr">IP / 首碼</label>
        <input id="cidr" type="text" placeholder="例如：192.168.1.10/24" />
      </section>

      <section id="mask-panel" class="panel hidden">
        <label for="ip">IP 位址</label>
        <input id="ip" type="text" placeholder="例如：192.168.1.10" />

        <label for="mask">子網路遮罩</label>
        <input id="mask" type="text" placeholder="例如：255.255.255.0" />
      </section>

      <div class="actions">
        <button id="calcBtn">開始計算</button>
        <button id="clearBtn" class="light">清除</button>
      </div>

      <p id="message" class="message"></p>

      <section id="result" class="result hidden">
        <h2>計算結果</h2>
        <div class="result-grid">
          <div class="item">
            <span>子網路遮罩</span>
            <strong id="subnetMask">-</strong>
          </div>
          <div class="item">
            <span>網段名稱</span>
            <strong id="networkName">-</strong>
          </div>
          <div class="item">
            <span>廣播位置</span>
            <strong id="broadcast">-</strong>
          </div>
          <div class="item">
            <span>IP 網段範圍</span>
            <strong id="ipRange">-</strong>
          </div>
          <div class="item">
            <span>可用 IP 範圍</span>
            <strong id="usableRange">-</strong>
          </div>
          <div class="item">
            <span>可用主機數</span>
            <strong id="hostCount">-</strong>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
